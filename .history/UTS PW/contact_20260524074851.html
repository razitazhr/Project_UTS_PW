<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomify - Contact</title>
    <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    /* NAVBAR */
    .navbar{
      width:100%;
      height:90px;
      background:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 40px;
      position:fixed;
      top:0;
      z-index:1000;
    }

    .logo h1{
      color:#ef6aac;
      font-size:42px;
      font-weight:bold;
    }

    .logo p{
      font-size:14px;
      color:#666;
      margin-top:-5px;
    }

    .menu{
      display:flex;
      gap:40px;
      list-style:none;
    }

    .menu li a{
      text-decoration:none;
      color:#1d2340;
      font-size:22px;
      font-weight:500;
      transition:0.3s;
    }

    .menu li a:hover,
    .menu li .active{
      color:#ef6aac;
      border-bottom:3px solid #ef6aac;
      padding-bottom:5px;
    }

    .right-menu{
      display:flex;
      align-items:center;
      gap:25px;
    }

    .icon{
      font-size:28px;
      cursor:pointer;
    }

    .login-btn{
      padding:12px 28px;
      border:none;
      border-radius:30px;
      background:#ef6aac;
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#d94d92;
    }

    /* HERO */
    .hero{
      margin-top:90px;
      width:100%;
      min-height:100vh;
      background:
      linear-gradient(to right,
      rgba(255,245,235,0.9),
      rgba(245,160,190,0.8)),
      url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:50px 20px;
    }

    /* CONTACT BOX */
    .contact-box{
      background:white;
      width:100%;
      max-width:700px;
      padding:40px;
      border-radius:20px;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .contact-box h1{
      text-align:center;
      color:#ef6aac;
      margin-bottom:10px;
      font-size:50px;
    }

    .contact-box p{
      text-align:center;
      color:#777;
      margin-bottom:30px;
      font-size:18px;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#333;
      font-size:18px;
      font-weight:bold;
    }

    .input-group input,
    .input-group textarea{
      width:100%;
      padding:15px;
      border:1px solid #ddd;
      border-radius:10px;
      font-size:16px;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus,
    .input-group textarea:focus{
      border-color:#ef6aac;
      box-shadow:0 0 5px rgba(239,106,172,0.5);
    }

    textarea{
      resize:none;
      height:140px;
    }

    .submit-btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:30px;
      background:#ef6aac;
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
    }

    .submit-btn:hover{
      background:#d94d92;
    }

    .success{
      margin-top:20px;
      text-align:center;
      color:green;
      font-size:18px;
      font-weight:bold;
    }

    /* RESPONSIVE */
    @media(max-width:900px){

      .navbar{
        flex-direction:column;
        height:auto;
        padding:20px;
      }

      .menu{
        margin:20px 0;
        gap:20px;
        flex-wrap:wrap;
        justify-content:center;
      }

      .contact-box h1{
        font-size:40px;
      }
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <div class="logo">
      <h1>Bloomify</h1>
      <p>Bouquet & Gift Shop</p>
    </div>

    <ul class="menu">
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">Categories</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#" class="active">Contact</a></li>
    </ul>

    <div class="right-menu">
      <span class="icon">🔍</span>
      <span class="icon">🛒</span>
      <button class="login-btn">Login</button>
    </div>

  </nav>

  <!-- CONTACT SECTION -->
  <section class="hero">

    <div class="contact-box">

      <h1>Contact Us</h1>
      <p>Send your message to Bloomify 🌸</p>

      <form onsubmit="sendMessage(event)">

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
          <label>Message</label>
          <textarea id="message" placeholder="Write your message"></textarea>
        </div>

        <button type="submit" class="submit-btn">
          Send Message
        </button>

        <div class="success" id="successMsg"></div>

      </form>

    </div>

  </section>

  <script>

    function sendMessage(event){
      event.preventDefault();

      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let message = document.getElementById("message").value;

      let successMsg = document.getElementById("successMsg");

      if(name === "" || email === "" || message === ""){
        successMsg.style.color = "red";
        successMsg.innerHTML = "Please fill in all fields!";
      }else{
        successMsg.style.color = "green";
        successMsg.innerHTML = "Message sent successfully 🌸";
      }
    }

  </script>

</body>
</html>
