<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hampers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    body{
        font-family: 'Poppins', sans-serif;
    }
    </style>
</head>
<body class="bg-pink-50">
    <div class="max-w-6xl mx-auto p-10">
    <a 
    href="UTS PW.html"
    class="inline-block mb-8 bg-white px-5 py-2 rounded-full shadow text-pink-500"
    >
    ← Back
    </a>
    <div class="bg-white rounded-[40px] shadow-xl overflow-hidden">
        <div class="grid md:grid-cols-2 gap-10 p-10">
        <div>
            <img 
            src="https://i.pinimg.com/736x/e6/c2/d4/e6c2d48c7302ab892a5b775743bed915.jpg"
            alt="Hampers"
            class="w-full h-full object-cover rounded-3xl"
            >
        </div>
        <div class="flex flex-col justify-center">
            <p class="uppercase tracking-[4px] text-gray-400 mb-2">
                Bloomify Collection
            </p>
            <h1 class="text-5xl font-bold text-pink-400 mb-5">
                Premium Hampers
            </h1>
            <p class="text-gray-600 leading-relaxed mb-6">
                Hampers eksklusif dengan isi premium yang cocok untuk hari raya, corporate gift, dan hadiah spesial keluarga.
            </p>
            <div class="mb-6">
            <span class="text-3xl font-bold text-pink-500">
                Rp 450.000
            </span>
        </div>
        <div class="space-y-3 mb-8 text-gray-600">
            <p>🎁 Exclusive Hampers</p>
            <p>✨ Elegant Packaging</p>
            <p>🚚 Fast Delivery</p>
            <p>💌 Free Greeting Card</p>
        </div>
        <div class="flex gap-4">
            <button 
            type="button"
            class="bg-pink-400 hover:bg-pink-500 text-white px-8 py-3 rounded-full shadow-lg"
            >
            Buy Now
            </button>
            <button 
            type="button"
            id="wishlist-btn"
            class="border border-pink-400 text-pink-400 px-8 py-3 rounded-full"
            >
            Wishlist
            </button>
        </div>
        </div>
    </div>
    </div>
</div>
<script>
const cartItems = document.getElementById("cart-items");
let cart = JSON.parse(localStorage.getItem("cart")) || [];
function displayCart() {
    cartItems.innerHTML = "";
    if(cart.length === 0){
        cartItems.innerHTML = `
        <div class="bg-white rounded-3xl shadow-lg p-10 text-center">
            <h2 class="text-2xl font-semibold text-gray-600">
                Keranjang masih kosong 🛒
            </h2>
        </div>
        `;
        return;
    }
    cart.forEach((product, index) => {
        cartItems.innerHTML += `
        <div class="bg-white rounded-3xl shadow-lg p-8 flex items-center justify-between gap-6">
            <div class="flex items-center gap-6">
                <img 
                src="${product.image}"
                alt="${product.name}"
                class="w-40 h-40 object-cover rounded-3xl"
                >
                <div>
                    <h2 class="text-2xl font-semibold">
                        ${product.name}
                    </h2>
                    <p class="text-pink-500 font-bold text-2xl mt-4">
                        ${product.price}
                    </p>
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <button 
                type="button"
                class="bg-pink-400 hover:bg-pink-500 text-white px-6 py-3 rounded-full"
                >
                    Checkout
                </button>
                <button 
                type="button"
                onclick="removeItem(${index})"
                class="border border-red-400 text-red-400 hover:bg-red-400 hover:text-white px-6 py-3 rounded-full"
                >
                    Remove
                </button>
            </div>

        </div>
        `;
    });
}
function removeItem(index){
    cart.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));

    displayCart();
}
displayCart();
</script>
</body>
</html>
